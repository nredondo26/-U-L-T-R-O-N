<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSmall">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="none" stroke="#1e1e2a" stroke-width="2"/>

  <!-- Neural network nodes and connections -->
  <g stroke="#22d3ee" stroke-width="2" opacity=".3" filter="url(#glowSmall)">
    <line x1="256" y1="80" x2="160" y2="200"/>
    <line x1="256" y1="80" x2="352" y2="200"/>
    <line x1="160" y1="200" x2="120" y2="340"/>
    <line x1="160" y1="200" x2="256" y2="280"/>
    <line x1="352" y1="200" x2="392" y2="340"/>
    <line x1="352" y1="200" x2="256" y2="280"/>
    <line x1="120" y1="340" x2="256" y2="420"/>
    <line x1="392" y1="340" x2="256" y2="420"/>
    <line x1="256" y1="280" x2="256" y2="420"/>
  </g>

  <!-- Nodes -->
  <g fill="#22d3ee" filter="url(#glowSmall)">
    <circle cx="256" cy="80" r="8" opacity=".6"/>
    <circle cx="160" cy="200" r="6" opacity=".5"/>
    <circle cx="352" cy="200" r="6" opacity=".5"/>
    <circle cx="120" cy="340" r="6" opacity=".4"/>
    <circle cx="392" cy="340" r="6" opacity=".4"/>
    <circle cx="256" cy="420" r="6" opacity=".4"/>
  </g>

  <!-- Central U shape made of connected nodes -->
  <g filter="url(#glow)">
    <circle cx="200" cy="200" r="14" fill="#22d3ee"/>
    <circle cx="256" cy="200" r="14" fill="#22d3ee"/>
    <circle cx="312" cy="200" r="14" fill="#22d3ee"/>
    <rect x="200" y="200" width="14" height="80" rx="7" fill="#22d3ee"/>
    <rect x="298" y="200" width="14" height="80" rx="7" fill="#22d3ee"/>
    <path d="M200 280 Q200 320 256 320 Q312 320 312 280" fill="none" stroke="#22d3ee" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- Inner highlight on U -->
  <g opacity=".5">
    <circle cx="200" cy="200" r="6" fill="#fff"/>
    <circle cx="256" cy="200" r="6" fill="#fff"/>
    <circle cx="312" cy="200" r="6" fill="#fff"/>
  </g>

  <!-- Orbiting particles -->
  <g fill="#22d3ee" opacity=".6" filter="url(#glowSmall)">
    <circle cx="160" cy="130" r="3">
      <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="370" cy="150" r="2.5">
      <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="380" r="2">
      <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="-360 256 256" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="360" r="2.5">
      <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="-360 256 256" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
