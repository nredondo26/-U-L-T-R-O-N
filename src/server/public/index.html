<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ULTRON v5</title>
<style>
:root{--bg:#0a0a1a;--surface:#111128;--border:#1a1a3a;--primary:#0ea5e9;--accent:#38bdf8;--success:#34d399;--warn:#fbbf24;--error:#f87171;--text:#c8d8e8;--dim:#4a5570;font-family:system-ui,sans-serif;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:13px}
/* HEADER */
.header{display:flex;align-items:center;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px}
.logo{font-weight:700;font-size:14px;color:var(--primary);letter-spacing:1px}
.status{width:8px;height:8px;border-radius:50%;background:var(--success);margin-right:4px}
.model-select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;min-width:250px}
.model-select:focus{outline:none;border-color:var(--primary)}
.stats{font-size:11px;color:var(--dim);margin-left:auto}
/* MAIN */
.main{display:flex;flex:1;overflow:hidden}
/* CHAT */
.chat{flex:1;display:flex;flex-direction:column}
.messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:80%;padding:10px 14px;border-radius:10px;line-height:1.5;word-wrap:break-word;animation:in .2s}
@keyframes in{from{opacity:0;transform:translateY(4px)}}
.msg.user{align-self:flex-end;background:rgba(14,165,233,.12);border:1px solid rgba(14,165,233,.15)}
.msg.ai{align-self:flex-start;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}
.msg.error{align-self:flex-start;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.12);color:var(--error)}
.msg.system{align-self:center;font-size:11px;color:var(--dim);padding:4px 12px;background:var(--surface);border-radius:12px}
.msg pre{background:rgba(0,0,0,.4);padding:8px;border-radius:6px;overflow-x:auto;font-size:11px;margin:4px 0;border:1px solid var(--border)}
.msg code{font-size:11px;background:rgba(14,165,233,.1);padding:1px 4px;border-radius:3px}
.msg pre code{background:none;padding:0}
.meta{font-size:10px;color:var(--dim);margin-top:4px;display:flex;justify-content:space-between}
/* LOADING */
.typing{padding:10px 14px;display:flex;gap:4px;align-self:flex-start}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--primary);animation:blink 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
/* INPUT */
.input-wrap{display:flex;gap:8px;padding:10px 16px;background:var(--surface);border-top:1px solid var(--border)}
.input-wrap textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;resize:none;outline:none;min-height:40px;max-height:100px;font-family:inherit}
.input-wrap textarea:focus{border-color:var(--primary)}
.input-wrap button{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.input-wrap button:hover{opacity:.85}
.input-wrap button:disabled{opacity:.4;cursor:not-allowed}
/* SIDEBAR */
.sidebar{width:240px;background:var(--surface);border-left:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;display:none}
.sidebar.show{display:flex}
.sidebar h3{font-size:11px;text-transform:uppercase;color:var(--dim);letter-spacing:1px}
.cmd-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:12px;cursor:pointer;text-align:left;transition:.15s}
.cmd-btn:hover{background:rgba(14,165,233,.08);border-color:var(--primary)}
/* AGENT EVENTS */
.events{font-size:10px;color:var(--dim);max-height:150px;overflow-y:auto}
.event{padding:2px 0;display:flex;gap:4px}
.event .agent{color:var(--primary);font-weight:600}
.toggle-sidebar{background:none;border:1px solid var(--border);color:var(--dim);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px}
</style>
</head>
<body>

<div class="header">
  <div class="status" id="status"></div>
  <span class="logo">ULTRON</span>
  <select class="model-select" id="modelSelect" onchange="selectModel()"></select>
  <span class="stats" id="stats">tokens: 0</span>
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
</div>

<div class="main">
<div class="chat">
  <div class="messages" id="messages">
    <div class="msg system">J.A.R.V.I.S. v5.0.0 — Neural Intelligence Platform</div>
  </div>
  <div class="input-wrap">
    <textarea id="input" placeholder="Type your message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="micBtn" onclick="toggleMic()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;cursor:pointer;font-size:16px" title="Voice input">&#127908;</button>
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>
<div class="sidebar" id="sidebar">
  <h3>Commands</h3>
  <button class="cmd-btn" onclick="runCmd('/build')">🔨 /build</button>
  <button class="cmd-btn" onclick="runCmd('/test')">🧪 /test</button>
  <button class="cmd-btn" onclick="runCmd('/install')">📦 /install</button>
  <button class="cmd-btn" onclick="runCmd('/index')">🔍 /index</button>
  <button class="cmd-btn" onclick="runCmd('/status')">📊 /status</button>
  <button class="cmd-btn" onclick="runCmd('/vault')">📝 /vault</button>
  <h3>Agent Events</h3>
  <div class="events" id="events"></div>
</div>
</div>

<script>
let currentModel = 'deepseek-chat';
let isStreaming = false;
let streamMsg = null;

async function loadModels() {
  const r = await fetch('/api/models');
  const data = await r.json();
  currentModel = data.current;
  const sel = document.getElementById('modelSelect');
  sel.innerHTML = '';
  const grouped = {};
  for (const m of data.models) {
    if (!grouped[m.provider]) grouped[m.provider] = [];
    grouped[m.provider].push(m);
  }
  for (const [provider, models] of Object.entries(grouped)) {
    const optg = document.createElement('optgroup');
    optg.label = provider;
    for (const m of models) {
      const opt = document.createElement('option');
      opt.value = m.model;
      opt.textContent = (m.healthy ? '' : '⬇ ') + m.model + (m.free ? ' (free)' : '');
      if (m.model === currentModel) opt.selected = true;
      optg.appendChild(opt);
    }
    sel.appendChild(optg);
  }
  document.getElementById('stats').textContent = `tokens: ${data.stats.tokens.toLocaleString()} | reqs: ${data.stats.requests}`;
}

function selectModel() {
  currentModel = document.getElementById('modelSelect').value;
  fetch('/api/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({message: '/models ' + currentModel}) });
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming) return;
  input.value = '';

  addMessage(text, 'user');
  showTyping(true);
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    // Use SSE for streaming
    const eventSource = new EventSource('/ws');
    
    eventSource.addEventListener('stream', (e) => {
      const data = JSON.parse(e.data);
      if (!streamMsg) {
        streamMsg = addMessage('', 'ai');
        hideTyping();
      }
      streamMsg.innerHTML += data.content.replace(/\n/g,'<br>');
      scrollDown();
    });

    eventSource.addEventListener('event', (e) => {
      const data = JSON.parse(e.data);
      addEvent(data);
    });

    // Send message via POST
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text, model: currentModel}),
    });
    const result = await r.json();

    eventSource.close();

    if (!streamMsg) {
      hideTyping();
      if (result.error) addMessage(result.error, 'error');
      else if (result.response) addMessage(result.response, 'ai', result.model);
    } else {
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.innerHTML = `<span>${result.model || currentModel}</span><span>tokens: ${result.tokens?.tokens || '?'}</span>`;
      streamMsg.appendChild(meta);
      streamMsg = null;
    }

    document.getElementById('stats').textContent = `tokens: ${(result.tokens?.tokens || 0).toLocaleString()}`;
  } catch (e) {
    hideTyping();
    addMessage('Connection error: ' + e.message, 'error');
  }

  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;
  scrollDown();
}

function addMessage(text, type, model) {
  const el = document.createElement('div');
  el.className = 'msg ' + type;
  const formatted = text
    .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  el.innerHTML = formatted;
  if (type === 'ai' && model) {
    el.innerHTML += `<div class="meta"><span>${model}</span></div>`;
  }
  document.getElementById('messages').appendChild(el);
  scrollDown();
  return el;
}

function showTyping(show) {
  if (show) {
    const el = document.createElement('div');
    el.id = 'typing'; el.className = 'typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    document.getElementById('messages').appendChild(el);
  } else {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }
  scrollDown();
}

function hideTyping() { showTyping(false); }

function scrollDown() {
  const el = document.getElementById('messages');
  setTimeout(() => el.scrollTop = el.scrollHeight, 10);
}

function addEvent(data) {
  const el = document.getElementById('events');
  const div = document.createElement('div');
  div.className = 'event';
  div.innerHTML = `<span class="agent">${data.agent}</span> ${data.message}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function runCmd(cmd) {
  document.getElementById('input').value = cmd;
  send();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('show');
}

loadModels();
document.getElementById('input').focus();

// Voice input (Web Speech API)
let recognition = null;
let isListening = false;

function toggleMic() {
  if (isListening) { stopMic(); return; }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert('Voice not supported in this browser'); return; }
  recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onstart = () => { isListening = true; document.getElementById('micBtn').style.background = 'var(--error)'; };
  recognition.onresult = (e) => {
    let t = ''; for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('input').value = t;
  };
  recognition.onend = () => { isListening = false; document.getElementById('micBtn').style.background = ''; const v = document.getElementById('input').value.trim(); if (v) send(); };
  recognition.onerror = (e) => { isListening = false; document.getElementById('micBtn').style.background = ''; };
  recognition.start();
}

function stopMic() { if (recognition) recognition.stop(); }
</script>
</body>
</html>
