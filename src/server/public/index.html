<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ULTRON</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/favicon.ico">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2a;--hover:#1a1a28;--accent:#22d3ee;--accent-dim:rgba(34,211,238,0.15);--text:#e2e8f0;--dim:#6b7280;--success:#4ade80;--warn:#fbbf24;--error:#f87171;--font:system-ui,-apple-system,sans-serif}
#authOverlay{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:16px}
#authOverlay.show{display:flex}
#authOverlay h2{font-size:24px;color:var(--accent);font-weight:700;letter-spacing:2px}
#authOverlay input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:14px;width:280px;outline:none;text-align:center;font-family:var(--font)}
#authOverlay input:focus{border-color:var(--accent)}
#authOverlay button{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}
#authOverlay .auth-error{color:var(--error);font-size:12px;display:none}
#authOverlay .auth-skip{font-size:11px;color:var(--dim);cursor:pointer;background:none;border:none;text-decoration:underline}
#validateBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--surface);border-bottom:1px solid var(--accent);padding:8px 16px;align-items:center;gap:12px}
#validateBanner.show{display:flex}
#validateBannerBar{flex:1;max-width:200px;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
#validateBannerFill{height:100%;background:var(--accent);border-radius:3px;transition:width .15s ease;width:0%}
#validateBannerLabel{font-size:12px;color:var(--text);white-space:nowrap}
#validateBannerDetail{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#validateBannerClose{font-size:14px;color:var(--dim);cursor:pointer;padding:0 4px;margin-left:auto;background:none;border:none}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;line-height:1.5}
.header{display:flex;align-items:center;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px;flex-shrink:0}
.logo{font-weight:700;font-size:16px;color:var(--accent);letter-spacing:1px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex-shrink:0}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.model-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;font-size:12px;outline:none;cursor:pointer;font-family:var(--font)}
.model-select:focus{border-color:var(--accent)}
.model-select option{background:var(--surface)}
.header-stats{font-size:11px;color:var(--dim);display:flex;gap:12px}
.header-stats span{color:var(--text)}
.main{display:flex;flex:1;overflow:hidden}
.chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.messages::-webkit-scrollbar{width:4px}.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:720px;padding:10px 14px;border-radius:10px;line-height:1.6;font-size:13.5px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}}
.msg.user{align-self:flex-end;background:var(--accent-dim);border:1px solid rgba(34,211,238,0.12)}
.msg.ai{align-self:flex-start;background:var(--surface);border:1px solid var(--border)}
.msg.system{align-self:center;font-size:11px;color:var(--dim);padding:4px 14px;background:var(--surface);border-radius:12px;border:1px solid var(--border)}
.msg code{background:rgba(255,255,255,.06);padding:1px 5px;border-radius:4px;font-size:12.5px}
.msg pre{background:rgba(0,0,0,.3);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:6px 0;font-size:12px;border:1px solid var(--border)}
.typing-indicator{display:flex;gap:3px;padding:4px 0}
.typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:bounce 1.4s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-wrap{display:flex;gap:8px;padding:12px 20px 16px;background:var(--bg);border-top:1px solid var(--border)}
.input-wrap textarea{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;resize:none;outline:none;min-height:42px;max-height:120px;font-family:var(--font);transition:border-color .15s}
.input-wrap textarea:focus{border-color:var(--accent)}
.input-wrap textarea::placeholder{color:var(--dim)}
.btn-group{display:flex;gap:8px;flex-shrink:0}
.send-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:0 18px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:opacity .15s;white-space:nowrap}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:default}
.stop-btn{background:var(--error);color:#fff;border:none;border-radius:8px;padding:0 14px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:opacity .15s;white-space:nowrap;display:none}
.stop-btn:hover{opacity:.85}
.queue-badge{display:none;align-self:center;font-size:10px;color:var(--warn);padding:2px 8px;background:rgba(251,191,36,0.12);border-radius:10px;white-space:nowrap}

/* Agent sidebar */
.sidebar{width:300px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-title{padding:12px 16px;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-title .badge{font-size:9px;background:var(--border);padding:1px 6px;border-radius:8px;color:var(--dim)}
.agent-list{flex:1;overflow-y:auto;padding:4px}
.agent-list::-webkit-scrollbar{width:3px}.agent-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.agent-item{border-radius:6px;margin:2px 0;transition:background .15s;cursor:pointer}
.agent-item:hover{background:var(--hover)}
.agent-item.active{background:var(--accent-dim)}
.agent-item.done{background:rgba(74,222,128,0.08)}
.agent-header{display:flex;align-items:center;gap:10px;padding:8px 12px}
.agent-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.agent-info{flex:1;min-width:0}
.agent-name{font-size:12px;font-weight:500;color:var(--text)}
.agent-status-text{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.agent-status-text.active{color:var(--accent)}
.agent-status-text.done{color:var(--success)}
.agent-check{display:none;font-size:12px;color:var(--success);flex-shrink:0;animation:fadeIn .3s ease}
.agent-check.show{display:inline}
.agent-progress{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.agent-progress-bar{height:100%;border-radius:2px;transition:width .3s ease;width:0%}
.agent-progress-bar.active{background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
.agent-progress-bar.done{background:var(--success);width:100%!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Agent action log (collapsible) */
.agent-log{display:none;padding:0 12px 8px 50px;font-size:10px;color:var(--dim);max-height:120px;overflow-y:auto}
.agent-log.open{display:block}
.agent-log::-webkit-scrollbar{width:2px}.agent-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.agent-log-entry{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);display:flex;gap:6px}
.agent-log-time{color:var(--dim);flex-shrink:0;font-family:monospace;font-size:9px}
.agent-log-text{color:var(--text);opacity:.7}

@media(max-width:768px){.sidebar{display:none}.msg{max-width:100%}.header-stats{display:none}}
</style>
</head>
<body>
<div id="authOverlay"><h2>ULTRON</h2><input id="authInput" type="password" placeholder="API Key"><button id="authSubmit">Desbloquear</button><div class="auth-error" id="authError"></div><button class="auth-skip" id="authSkip">Usar sin autenticacion</button></div>
<div id="validateBanner">
  <div id="validateBannerLabel">Validando modelos...</div>
  <div id="validateBannerBar"><div id="validateBannerFill"></div></div>
  <div id="validateBannerDetail">Iniciando...</div>
  <button id="validateBannerClose" onclick="document.getElementById('validateBanner').classList.remove('show')">✕</button>
</div>
<div class="header">
  <span class="logo">ULTRON</span><div class="status-dot" id="statusDot"></div>
  <div class="header-right">
    <span class="header-stats" id="headerStats"><span>0</span> tokens</span>
    <span class="queue-badge" id="headerStatus" style="font-size:10px;color:var(--dim)"></span>
    <select class="model-select" id="modelSelect"><option>Loading...</option></select>
    <button class="send-btn" id="testBtn" onclick="testModels()" style="font-size:11px;padding:0 10px">Test</button>
  </div>
</div>
<div class="main">
  <div class="chat-panel">
    <div class="messages" id="messages"><div class="msg system" id="connectingMsg">Connecting...</div></div>
    <div class="input-wrap">
      <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
      <div class="btn-group">
        <span class="queue-badge" id="queueBadge">0 en cola</span>
        <button class="stop-btn" id="stopBtn" onclick="stop()">Stop</button>
        <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
      </div>
    </div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">Agentes <span class="badge" id="activeCount">0 activos</span></div>
    <div class="agent-list" id="agentList"></div>
  </div>
</div>

<script>
let authToken='';
function apiFetch(url,opts={}){
  const headers={...opts.headers||{}};
  if(authToken)headers['Authorization']='Bearer '+authToken;
  return fetch(url,{...opts,headers});
}
(async function initAuth(){
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:'_check_'})});
    const d=await r.json();
    if(d.ok&&d.message)return;
    const saved=localStorage.getItem('ultron_api_key');
    if(saved){
      const vr=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:saved})});
      const vd=await vr.json();
      if(vd.ok){authToken=saved;return}
    }
    document.getElementById('authOverlay').classList.add('show');
    document.getElementById('authSubmit').onclick=async()=>{
      const key=document.getElementById('authInput').value.trim();if(!key)return;
      const ar=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})});
      const ad=await ar.json();
      if(ad.ok){authToken=key;localStorage.setItem('ultron_api_key',key);document.getElementById('authOverlay').classList.remove('show')}
      else{const err=document.getElementById('authError');err.style.display='block';err.textContent='Invalid key';}
    };
    document.getElementById('authInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('authSubmit').click()});
  }catch(e){}
})();

document.getElementById('input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

const agents = [
  { id:'Orchestrator', displayName:'Cerebro',     icon:'⬡', color:'#22d3ee' },
  { id:'Architect',    displayName:'Visión',      icon:'△', color:'#f59e0b' },
  { id:'Editor',       displayName:'Artífice',    icon:'◇', color:'#4ade80' },
  { id:'Librarian',    displayName:'Sabio',       icon:'○', color:'#60a5fa' },
  { id:'Basher',       displayName:'Ejecutor',    icon:'▽', color:'#a78bfa' },
  { id:'Researcher',   displayName:'Explorador',  icon:'□', color:'#2dd4bf' },
  { id:'Thinker',      displayName:'Estratega',   icon:'◎', color:'#fb923c' },
  { id:'Reviewer',     displayName:'Juez',        icon:'☆', color:'#f472b6' },
];

let tokens=0,model='',isStreaming=false,streamMsg=null,currentController=null;
const pendingQueue=[];
const agentLogs = {}; // agentId -> [{time,text}]
const agentDoneTimers = {}; // agentId -> timeout

function renderAgentList(){
  const list=document.getElementById('agentList');list.innerHTML='';
  for(const a of agents){
    const el=document.createElement('div');el.className='agent-item';el.id='agent-'+a.id;
    el.innerHTML='<div class="agent-header">'+
      '<div class="agent-icon" style="background:'+a.color+'20;color:'+a.color+'">'+a.icon+'</div>'+
      '<div class="agent-info">'+
        '<div class="agent-name">'+(a.displayName||a.id)+'</div>'+
        '<div class="agent-status-text" id="stxt-'+a.id+'">idle</div>'+
        '<div class="agent-progress"><div class="agent-progress-bar" id="prog-'+a.id+'" style="background:'+a.color+'"></div></div>'+
      '</div>'+
      '<span class="agent-check" id="chk-'+a.id+'">✓</span>'+
    '</div>'+
    '<div class="agent-log" id="log-'+a.id+'"></div>';
    el.addEventListener('click',()=>toggleAgentLog(a.id));
    list.appendChild(el);
    agentLogs[a.id]=[];
  }
}
renderAgentList();

function toggleAgentLog(id){
  const log=document.getElementById('log-'+id);
  log.classList.toggle('open');
  if(log.classList.contains('open'))renderAgentLog(id);
}

function renderAgentLog(id){
  const log=document.getElementById('log-'+id);
  if(!log.classList.contains('open'))return;
  const entries=agentLogs[id]||[];
  if(entries.length===0){log.innerHTML='<div class="agent-log-entry"><span class="agent-log-text">(sin actividad reciente)</span></div>';return}
  log.innerHTML=entries.map(e=>'<div class="agent-log-entry"><span class="agent-log-time">'+e.time+'</span><span class="agent-log-text">'+esc(e.text)+'</span></div>').join('');
  log.scrollTop=log.scrollHeight;
}

function setAgentStatus(id,status,msg){
  const a=agents.find(x=>x.id===id);if(!a)return;
  const item=document.getElementById('agent-'+id);
  const stxt=document.getElementById('stxt-'+id);
  const prog=document.getElementById('prog-'+id);
  const chk=document.getElementById('chk-'+id);
  if(!item||!stxt||!prog||!chk)return;

  // Clear any pending done timer
  if(agentDoneTimers[id]){clearTimeout(agentDoneTimers[id]);delete agentDoneTimers[id]}

  if(status==='active'||status==='action'){
    item.className='agent-item active';
    stxt.className='agent-status-text active';
    stxt.textContent=msg||'trabajando...';
    prog.className='agent-progress-bar active';
    chk.classList.remove('show');
    // Add to log
    if(msg){agentLogs[id].push({time:new Date().toLocaleTimeString(),text:msg});if(agentLogs[id].length>50)agentLogs[id].splice(0,agentLogs[id].length-50)}
    renderAgentLog(id);
  } else if(status==='thought'){
    item.className='agent-item active';
    stxt.className='agent-status-text active';
    stxt.textContent=msg||'pensando...';
    prog.className='agent-progress-bar active';
    chk.classList.remove('show');
  } else if(status==='done'||status==='result'){
    item.className='agent-item done';
    stxt.className='agent-status-text done';
    stxt.textContent=msg||'✓ completado';
    prog.className='agent-progress-bar done';
    chk.classList.add('show');
    // Free after 4s
    agentDoneTimers[id]=setTimeout(()=>{
      item.className='agent-item';
      stxt.className='agent-status-text';
      stxt.textContent='idle';
      prog.className='agent-progress-bar';
      prog.style.width='0%';
      chk.classList.remove('show');
      delete agentDoneTimers[id];
      updateActiveCount();
    },4000);
  } else {
    // idle / error
    item.className=status==='error'?'agent-item done':'agent-item';
    stxt.className='agent-status-text';
    stxt.textContent=status==='error'?('✗ '+ (msg||'error')):'idle';
    prog.className='agent-progress-bar';
    chk.classList.remove('show');
  }
  updateActiveCount();
}

function updateActiveCount(){
  const count=document.querySelectorAll('.agent-item.active').length;
  document.getElementById('activeCount').textContent=count+' activo'+(count!==1?'s':'');
}

// Poll agent states from backend every 2s
async function pollAgentStates(){
  try{
    const r=await apiFetch('/api/agents');const d=await r.json();
    if(d.agents)for(const s of d.agents){
      const known=agents.find(a=>a.id===s.id);
      if(known)setAgentStatus(s.id,s.status,s.message);
    }
  }catch(e){}
}
setInterval(pollAgentStates,2000);

async function loadModels(){
  try{
    const r=await apiFetch('/api/models');const d=await r.json();
    if(!d.models){setTimeout(loadModels,2000);return}
    const sel=document.getElementById('modelSelect');sel.innerHTML='';
    const providers={};
    for(const m of d.models){
      if(!providers[m.provider])providers[m.provider]=[];
      providers[m.provider].push(m);
    }
    for(const[prov,models] of Object.entries(providers)){
      const grp=document.createElement('optgroup');grp.label=prov;
      for(const m of models){
        const opt=document.createElement('option');opt.value=m.model;
        opt.textContent=(m.free?'★ ':'')+m.model+(m.healthy?'':' ⚠');
        if(m.model===d.current)opt.selected=true;
        grp.appendChild(opt);
      }
      sel.appendChild(grp);
    }
    model=d.current;updateStats();
    document.getElementById('connectingMsg').textContent='Ready';
  }catch(e){document.getElementById('connectingMsg').textContent='Connection error: '+(e.message||'unknown')}
}

async function switchModel(modelId){
  if(!modelId)return;
  try{const r=await apiFetch('/api/models',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:modelId})});const d=await r.json();model=d.current;updateStats()}catch(e){console.error(e)}
}

document.getElementById('modelSelect').addEventListener('change',e=>switchModel(e.target.value));
loadModels();

// SSE for streaming + events
const es=new EventSource('/ws');
es.addEventListener('validate',e=>{
  try{
    const d=JSON.parse(e.data);
    const banner=document.getElementById('validateBanner');
    const label=document.getElementById('validateBannerLabel');
    const bar=document.getElementById('validateBannerFill');
    const detail=document.getElementById('validateBannerDetail');
    if(d.type==='start'){
      banner.classList.add('show');
      label.textContent=d.message||'Validando modelos...';
      bar.style.width='0%';
      detail.textContent='0/'+d.total;
    }else if(d.type==='progress'){
      const pct=Math.round((d.done/d.total)*100);
      bar.style.width=pct+'%';
      detail.textContent=d.model+': '+(d.status==='healthy'?'✓':'✗')+' ('+d.done+'/'+d.total+')';
    }else if(d.type==='done'){
      bar.style.width='100%';
      detail.textContent='✓ '+d.healthy+' accesibles | ✗ '+d.unhealthy+' no accesibles';
      label.textContent='Modelos validados';
      setTimeout(()=>banner.classList.remove('show'),5000);
    }
  }catch(e){}
});

es.addEventListener('event',e=>{
  try{
    const d=JSON.parse(e.data);
    if(d.type==='action')setAgentStatus(d.agent,'action',d.message||d.data?.task||'')
    else if(d.type==='done')setAgentStatus(d.agent,'done',(d.displayName||d.agent)+' completado')
    else if(d.type==='thought')setAgentStatus(d.agent,'thought',d.message||'')
  }catch(e){}
});

// Intercept chat stream events too (the old path)
let sseLastEvent='';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function safeMD(t){return esc(t).replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre>$2</pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>')}

function addMessage(text,type){
  const el=document.createElement('div');el.className='msg '+type;
  el.innerHTML=safeMD(text);
  document.getElementById('messages').appendChild(el);el.scrollIntoView(false);return el
}

let streamRawText='';

function stop(){
  if(currentController){currentController.abort();currentController=null;currentController=undefined}
}

function updateQueueBadge(){
  const badge=document.getElementById('queueBadge');
  if(pendingQueue.length>0){badge.style.display='inline';badge.textContent=pendingQueue.length+' en cola'}
  else{badge.style.display='none'}
}

async function send(){
  const input=document.getElementById('input');const text=input.value.trim();if(!text)return;
  input.value='';
  if(isStreaming){
    pendingQueue.push(text);addMessage(text,'user');
    addMessage('(encolado — se procesará cuando termine el actual)','system');
    updateQueueBadge();return
  }
  isStreaming=true;document.getElementById('sendBtn').disabled=true;document.getElementById('stopBtn').style.display='inline';
  addMessage(text,'user');showTyping(true);
  await doSend(text);
}

async function doSend(text){
  const controller=new AbortController();currentController=controller;streamRawText='';
  const tm=setTimeout(()=>controller.abort(),180000);
  try{
    const resp=await apiFetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,model:model}),signal:controller.signal});clearTimeout(tm);
    if(!resp.ok){showTyping(false);addMessage('Error: HTTP '+resp.status,'ai');finishSend();return}
    if(controller.signal.aborted){finishSend();return}
    const reader=resp.body.getReader();const decoder=new TextDecoder();
    let leftover='',firstChunk=true;
    try{
      while(true){
        const{done,value}=await reader.read();if(done)break;
        if(controller.signal.aborted){reader.cancel();break}
        leftover+=decoder.decode(value,{stream:true});
        const lines=leftover.split('\n');leftover=lines.pop()||'';
        for(const line of lines){
          if(!line.trim())continue;
          try{
            const d=JSON.parse(line);
            if(d.type==='init'){model=d.model;document.getElementById('statusDot').style.background='var(--success)';updateStats()}
            else if(d.type==='stream'){
              if(!streamMsg){streamMsg=addMessage('','ai');showTyping(false);firstChunk=true}
              if(firstChunk){streamRawText=d.content||'';firstChunk=false}else{streamRawText+=d.content||''}
              streamMsg.textContent=streamRawText;streamMsg.scrollIntoView(false);
            }
            else if(d.type==='event'&&d.data){
              const ev=d.data;
              if(ev.type==='action')setAgentStatus(ev.agent,'action',ev.message||ev.data?.task||'')
              else if(ev.type==='done')setAgentStatus(ev.agent,'done',(ev.displayName||ev.agent)+' completado')
              else if(ev.type==='thought')setAgentStatus(ev.agent,'thought',ev.message||'')
            }
            else if(d.type==='result'){
              if(streamMsg&&streamRawText)streamMsg.innerHTML=safeMD(streamRawText);
              tokens=d.tokens?.tokens||0;updateStats();streamMsg=null;streamRawText='';
            }
            else if(d.type==='error'){showTyping(false);addMessage('Error: '+d.error,'ai')}
            else if(d.type==='done'){setAgentStatus('Orchestrator','done','Cerebro completado')}
          }catch(e){}
        }
      }
      if(streamMsg&&streamRawText)streamMsg.innerHTML=safeMD(streamRawText);
    }catch(e){
      if(controller.signal.aborted){addMessage('⏹ Detenido','system')}
      else{showTyping(false);addMessage('Error: '+(e.message||'Connection lost'),'ai')}
    }
  }catch(e){
    clearTimeout(tm);
    if(controller.signal.aborted){showTyping(false);addMessage('⏹ Detenido','system')}
    else{showTyping(false);addMessage('Error: '+(e.message||'Failed to fetch'),'ai')}
  }
  currentController=null;finishSend();
}

function finishSend(){
  isStreaming=false;document.getElementById('sendBtn').disabled=false;document.getElementById('stopBtn').style.display='none';updateStats();
  if(!currentController&&pendingQueue.length>0){
    const next=pendingQueue.shift();
    updateQueueBadge();
    addMessage('Procesando siguiente mensaje...','system');
    isStreaming=true;document.getElementById('sendBtn').disabled=true;document.getElementById('stopBtn').style.display='inline';showTyping(true);
    doSend(next)
  }
}

function showTyping(show){
  const existing=document.getElementById('typing');
  if(show&&!existing){
    const d=document.createElement('div');d.id='typing';d.className='msg ai';
    d.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>';
    document.getElementById('messages').appendChild(d);d.scrollIntoView(false)
  }else if(!show&&existing){existing.remove()}
}

async function testModels(){
  const btn=document.getElementById('testBtn');btn.disabled=true;btn.textContent='...';
  document.getElementById('headerStatus').textContent='Testing models...';
  const input=document.getElementById('input');const was=input.value;
  input.value='/test-models';document.getElementById('sendBtn').click();
  input.value=was;btn.disabled=false;btn.textContent='Test';
  setTimeout(()=>document.getElementById('headerStatus').textContent='',5000)
}
function updateStats(){document.getElementById('headerStats').innerHTML=`<span>${tokens.toLocaleString()}</span> tokens<span>${model||'?'}</span>`}
document.getElementById('input').focus();
</script>
